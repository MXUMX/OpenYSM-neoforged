name: Build Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual release"
        required: false
        default: "Manual trigger"

jobs:
  build-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Generate changelog
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/generate-changelog.sh

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.4

      - name: Checkout private compile-only libraries
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.CI_LIBS_REPOSITORY }}
          token: ${{ secrets.PRIV_REPO_PAT }}
          path: priv-storage
          lfs: true

      - name: Restore compile-only libraries
        run: bash .github/scripts/restore-ci-inputs.sh

      - name: Validate compile-only libraries
        run: bash .github/scripts/validate-ci-inputs.sh

      - name: Extract mod metadata
        id: metadata
        run: bash .github/scripts/extract-metadata.sh

      - name: Determine release suffix
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          MOD_VERSION: ${{ steps.metadata.outputs.mod_version }}
        run: bash .github/scripts/determine-release-suffix.sh

      - name: Build with Gradle
        run: gradle build --no-daemon

      - name: Prepare release artifacts
        env:
          MOD_VERSION: ${{ steps.metadata.outputs.mod_version }}
          JAR_VERSION: ${{ steps.release.outputs.jar_version }}
        run: bash .github/scripts/prepare-release-artifacts.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          tag_name: ${{ steps.release.outputs.tag_name }}
          name: ${{ steps.metadata.outputs.mod_name }} ${{ steps.release.outputs.display_version }} for Minecraft ${{ steps.metadata.outputs.minecraft_version }}
          target_commitish: ${{ github.sha }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.commits }}
          draft: false
          prerelease: false
